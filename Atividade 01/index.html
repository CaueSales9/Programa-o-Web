<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Prático - Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <form id="cadastroForm" novalidate>
            <div class="quest">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome">
                <span class="error-message" id="erro-nome"></span>
            </div>
    
            <div class="quest">
                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" name="endereco">
                <span class="error-message" id="erro-endereco"></span>
            </div>

            <div class="quest">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
                <span class="error-message" id="erro-email"></span>
            </div>

            <div class="quest">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha">
                <span class="error-message" id="erro-senha"></span>
            </div>

            <div class="quest">
                <label for="repitaSenha">Repita a senha:</label>
                <input type="password" id="Rsenha" name="repitaSenha">
                <span class="error-message" id="erro-repitaSenha"></span>
            </div>
            
            <button type="submit" id="botao-Cadastrar">Cadastrar</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
